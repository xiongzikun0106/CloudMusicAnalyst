name: 部署到 Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ===== 部署 Worker (API) =====
  deploy-worker:
    runs-on: ubuntu-latest
    name: 部署 Worker
    steps:
      - uses: actions/checkout@v4

      - name: 部署到 Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: deploy
          workingDirectory: ./

  # ===== 部署 Pages (前端) =====
  deploy-pages:
    runs-on: ubuntu-latest
    name: 部署 Pages
    needs: deploy-worker
    steps:
      - uses: actions/checkout@v4

      - name: 部署到 Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: pages deploy . --project-name=cloud-music-analyst