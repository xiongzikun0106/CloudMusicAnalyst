name = "cloud-music-analyst"
main = "api/index.js"
compatibility_date = "2024-12-01"

# 绑定自定义域名（需先在 Cloudflare 添加 DNS 记录）
workers_dev = false
routes = [
  { pattern = "api.cloudmusicanalyst.net", custom_domain = true }
]

# 环境变量：DeepSeek API Key
# 生产环境应在 Cloudflare Dashboard 设置，不要写在配置文件里
# [vars]
# DEEPSEEK_API_KEY = "sk-your-key-here"
